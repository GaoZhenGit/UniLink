server:
  port: ${SERVER_PORT:8082}

logging:
  file:
    name: logs/proxy.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

proxy:
  http:
    port: ${PROXY_HTTP_PORT:8888}
    basic-auth:
      enabled: ${PROXY_HTTP_BASIC_AUTH_ENABLED:true}
      username: ${PROXY_HTTP_BASIC_AUTH_USERNAME:admin}
      password: ${PROXY_HTTP_BASIC_AUTH_PASSWORD:password123}
  websocket:
    port: ${PROXY_WEBSOCKET_PORT:8889}
    ws-path: ${PROXY_WEBSOCKET_WS_PATH:/unilink}
    heartbeat-interval: ${PROXY_WEBSOCKET_HEARTBEAT_INTERVAL:30}
    heartbeat-timeout: ${PROXY_WEBSOCKET_HEARTBEAT_TIMEOUT:60}