spring:
  main:
    allow-circular-references: true
server:
  port: ${SERVER_PORT:8083}

logging:
  file:
    name: logs/access.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

access:
  id: ${ACCESS_ID:}
  http:
    port: ${ACCESS_HTTP_PORT:8888}
    basic-auth:
      enabled: ${ACCESS_HTTP_BASIC_AUTH_ENABLED:true}
      username: ${ACCESS_HTTP_BASIC_AUTH_USERNAME:admin}
      password: ${ACCESS_HTTP_BASIC_AUTH_PASSWORD:password123}
proxy:
  host: ${PROXY_HOST:localhost}
  port: ${PROXY_PORT:8889}
  ws-path: ${PROXY_WS_PATH:/access}
  ssl: ${PROXY_SSL:false}
  auto-reconnect: ${PROXY_AUTO_RECONNECT:true}
  heartbeat-interval: ${PROXY_HEARTBEAT_INTERVAL:30}
  reconnect:
    initial-delay: ${PROXY_RECONNECT_INITIAL_DELAY:1000}
    max-delay: ${PROXY_RECONNECT_MAX_DELAY:60000}
    multiplier: ${PROXY_RECONNECT_MULTIPLIER:2.0}