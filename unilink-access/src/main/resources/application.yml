spring:
  main:
    allow-circular-references: true
server:
  port: ${SERVER_PORT:8083}

logging:
  file:
    name: logs/access.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

access:
  http:
    port: ${ACCESS_HTTP_PORT:8888}
    basic-auth:
      enabled: ${ACCESS_HTTP_BASIC_AUTH_ENABLED:true}
      username: ${ACCESS_HTTP_BASIC_AUTH_USERNAME:admin}
      password: ${ACCESS_HTTP_BASIC_AUTH_PASSWORD:password123}
  proxy:
    host: ${ACCESS_PROXY_HOST:localhost}
    port: ${ACCESS_PROXY_PORT:8889}
    ws-path: ${ACCESS_PROXY_WS_PATH:/access}
    ssl: ${ACCESS_PROXY_SSL:false}
    heartbeat-interval: ${ACCESS_PROXY_HEARTBEAT_INTERVAL:30}
    reconnect:
      initial-delay: ${ACCESS_RECONNECT_INITIAL_DELAY:1000}
      max-delay: ${ACCESS_RECONNECT_MAX_DELAY:60000}
      multiplier: ${ACCESS_RECONNECT_MULTIPLIER:2.0}
