spring:
  main:
    allow-circular-references: true
  server:
    port: 8081

logging:
  file:
    name: logs/worker.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

worker:
  server:
    host: localhost
    port: 8889
    ws-path: /ws
    ssl: false
    auto-reconnect: true
  reconnect:
    initial-delay: 1000
    max-delay: 60000
    multiplier: 2.0
  http:
    connect-timeout: 30000
    read-timeout: 300000