spring:
  main:
    allow-circular-references: true
server:
  port: ${SERVER_PORT:8081}

logging:
  file:
    name: logs/worker.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

# Proxy 连接配置 (与 access 保持一致)
proxy:
  host: ${PROXY_HOST:127.0.0.1}
  port: ${PROXY_PORT:8889}
  ws-path: ${PROXY_WS_PATH:/worker}
  ssl: ${PROXY_SSL:false}
  auto-reconnect: ${PROXY_AUTO_RECONNECT:true}
  heartbeat-interval: ${PROXY_HEARTBEAT_INTERVAL:30}
  reconnect:
    initial-delay: ${PROXY_RECONNECT_INITIAL_DELAY:1000}
    max-delay: ${PROXY_RECONNECT_MAX_DELAY:60000}
    multiplier: ${PROXY_RECONNECT_MULTIPLIER:2.0}

worker:
  id: ${WORKER_ID:}
  http:
    connect-timeout: ${WORKER_HTTP_CONNECT_TIMEOUT:30000}
    read-timeout: ${WORKER_HTTP_READ_TIMEOUT:300000}