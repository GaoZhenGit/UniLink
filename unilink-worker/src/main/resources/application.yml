spring:
  main:
    allow-circular-references: true
  server:
    port: ${SERVER_PORT:8081}

logging:
  file:
    name: logs/worker.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    com.unilink: DEBUG

worker:
  server:
    host: ${WORKER_SERVER_HOST:127.0.0.1}
    port: ${WORKER_SERVER_PORT:8889}
    ws-path: ${WORKER_SERVER_WS_PATH:/unilink}
    ssl: ${WORKER_SERVER_SSL:false}
    auto-reconnect: ${WORKER_SERVER_AUTO_RECONNECT:true}
  reconnect:
    initial-delay: ${WORKER_RECONNECT_INITIAL_DELAY:1000}
    max-delay: ${WORKER_RECONNECT_MAX_DELAY:60000}
    multiplier: ${WORKER_RECONNECT_MULTIPLIER:1.2}
  http:
    connect-timeout: ${WORKER_HTTP_CONNECT_TIMEOUT:30000}
    read-timeout: ${WORKER_HTTP_READ_TIMEOUT:300000}